name: Test

on:
  push:
    branches: [main]
  pull_request:

# Cross-platform matrix: ubuntu + macos + windows × Python 3.12 + 3.13.
# Python 3.11 dropped after PR-B4 CI surfaced result_hash divergence on 3.11
# vs 3.12+ across all platforms (filed as v1.4 follow-up). pyproject.toml
# requires-python = ">= 3.12". Six cells verify PCG64 byte-stability for
# bootstrap_ci and permutation_p_sharpe across OS boundaries.

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (including dev extras for pytest/mypy/ruff)
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -v

      - name: mypy — type-check new files (bootstrap + permutation + warnings + tick)
        shell: bash
        run: |
          uv run mypy \
            pancake_engine/metrics/bootstrap.py \
            pancake_engine/metrics/permutation.py \
            pancake_engine/warnings.py \
            pancake_engine/compile/condition.py \
            pancake_engine/runner/fill.py \
            pancake_engine/runner/tick.py \
            --ignore-missing-imports

      - name: ruff — lint truly-new files (bootstrap + permutation + tick + new tests)
        # warnings.py + condition.py were only modified additively (1-line each);
        # their pre-existing E501/UP042 baseline is out of scope for 0.4 release.
        shell: bash
        run: |
          uv run ruff check \
            pancake_engine/metrics/bootstrap.py \
            pancake_engine/metrics/permutation.py \
            pancake_engine/runner/fill.py \
            pancake_engine/runner/tick.py \
            tests/test_math_brutal_verification.py \
            tests/test_agent_supplied_feature_warning.py \
            tests/test_tick.py \
            tests/test_tick_fill.py
