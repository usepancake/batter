name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default: full matrix on every PR. If cost or flakiness warrants, fall back to:
#   - full matrix nightly on the default branch
#   - smaller matrix on PRs (Python 3.12 × Linux × Node 22 + Python 3.11/3.13 smoke jobs)
# Do not change defaults pre-emptively. See pancake-engine-0.3-pr-plan.md.

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }} / node-${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate V8 oracle expected bytes
        run: node tests/fixtures/canonical/v8_oracle.js

      - name: Run tests
        run: pytest -v
